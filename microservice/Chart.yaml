apiVersion: v2
name: msa-platform
description: index + market + post
type: application
version: 0.1.2 # chart 의 버전 
appVersion: "1.0.1" # application 의 버전

# 의존하는 dependency chart 목록
dependencies:
  - name: index-app
    version: "0.1.1"
    # "file://하위 chart 의 경로를 작성"
    repository: "file://charts/index"
    # 하위 chart 를 무조건 포함하는것이 아니고 조건부로 포함 하겠다는 의미 
    condition: index-app.enabled 

  - name: market-app
    version: "0.1.2"
    repository: "file://charts/market"
    condition: market-app.enabled

  - name: post-app
    version: "0.1.2"
    repository: "file://charts/post"
    condition: post-app.enabled